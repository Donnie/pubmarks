name: ETFs update daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scraper: statestreet
            page_url: "https://www.ssga.com/us/en/individual/etfs/state-street-spdr-sp-500-etf-trust-spy"
          - scraper: statestreet
            page_url: "https://www.ssga.com/us/en/individual/etfs/state-street-spdr-sp-semiconductor-etf-xsd"
          - scraper: blackrock
            page_url: "https://www.blackrock.com/lu/intermediaries/products/319084/ishares-msci-global-semiconductors-ucits-etf"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest statestreet release
        if: matrix.scraper == 'statestreet'
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("statestreet-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'statestreet' \
            --output ./statestreet
          chmod +x ./statestreet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest blackrock release
        if: matrix.scraper == 'blackrock'
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("blackrock-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'blackrock' \
            --output ./blackrock
          chmod +x ./blackrock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run scraper and save dated snapshot
        id: snapshot
        env:
          PAGE_URL: ${{ matrix.page_url }}
          SCRAPER: ${{ matrix.scraper }}
        run: |
          set -euo pipefail
          if [ "$SCRAPER" = "statestreet" ]; then
            BIN=./statestreet
          else
            BIN=./blackrock
          fi
          OUTPUT=$($BIN | jq .)
          DATE=$(echo "$OUTPUT" | jq -r '.date')
          TICKER_LOWER=$(echo "$OUTPUT" | jq -r '.ticker | ascii_downcase')
          if [ -z "$TICKER_LOWER" ] || [ "$TICKER_LOWER" = "null" ]; then
            echo "::error::missing or null .ticker in JSON output"
            exit 1
          fi
          mkdir -p "datasets/etfs/${TICKER_LOWER}"
          echo "$OUTPUT" > "datasets/etfs/${TICKER_LOWER}/${DATE}.json"
          echo "$OUTPUT" > "datasets/etfs/${TICKER_LOWER}/latest.json"
          echo "ticker_lower=${TICKER_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Upload dataset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.snapshot.outputs.ticker_lower }}
          path: datasets/etfs/${{ steps.snapshot.outputs.ticker_lower }}/

  commit:
    runs-on: ubuntu-latest
    needs: fetch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all datasets
        uses: actions/download-artifact@v4
        with:
          path: datasets/etfs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/
          git diff --staged --quiet || (git commit -m "chore: etfs update" && git pull --rebase origin main && git push)
