name: Stocks update daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Current year (UTC)
        id: year
        run: echo "year=$(date -u +%Y)" >> "$GITHUB_OUTPUT"

      - name: Download latest macrotrends release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("macrotrends-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'macrotrends' \
            --output ./macrotrends
          chmod +x ./macrotrends
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover tickers and refresh current-year OHLCV
        run: |
          set -euo pipefail
          YEAR="${{ steps.year.outputs.year }}"
          ROOT="datasets/stocks"
          if [ ! -d "$ROOT" ]; then
            echo "No ${ROOT}; nothing to update."
            exit 0
          fi
          mapfile -t dirs < <(find "$ROOT" -mindepth 1 -maxdepth 1 -type d | sort)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No ticker directories under ${ROOT}; nothing to update."
            exit 0
          fi
          first=true
          for dir in "${dirs[@]}"; do
            ticker_lower=$(basename "$dir")
            if [ "$first" != true ]; then
              sleep 3
            fi
            first=false
            ticker=$(echo "$ticker_lower" | tr '[:lower:]' '[:upper:]')
            echo "Updating ${ticker} -> ${ROOT}/${ticker_lower}/${YEAR}/ohlcv.csv"
            mkdir -p "${ROOT}/${ticker_lower}/${YEAR}"
            ./macrotrends ohlcv "$ticker" "$YEAR" > "${ROOT}/${ticker_lower}/${YEAR}/ohlcv.csv"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/stocks/
          git diff --staged --quiet || (git commit -m "chore: stocks ohlcv update" && git pull --rebase origin main && git push)

      - name: Purge and warm jsDelivr cache for stocks current-year OHLCV
        env:
          REPO: ${{ github.repository }}
          YEAR: ${{ steps.year.outputs.year }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for csv in datasets/stocks/*/"${YEAR}"/ohlcv.csv; do
            ticker=$(basename "$(dirname "$(dirname "$csv")")")
            path="datasets/stocks/${ticker}/${YEAR}/ohlcv.csv"
            purge_url="https://purge.jsdelivr.net/gh/${REPO}/${path}"
            cdn_url="https://cdn.jsdelivr.net/gh/${REPO}/${path}"
            echo "Purging ${purge_url}"
            curl -fsSL -o /dev/null -sS -X GET "$purge_url"
            echo "Warming ${cdn_url}"
            curl -fsSL -o /dev/null -sS -X GET "$cdn_url"
          done
