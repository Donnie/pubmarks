name: Stocks OHLCV update daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Current year (UTC)
        id: year
        run: echo "year=$(date -u +%Y)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync yf app (scripts/python/yf)
        run: uv sync --project scripts/python/yf --frozen --no-dev

      - name: Discover tickers and refresh current-year OHLCV
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          commit_if_staged() {
            local msg="$1"
            if git diff --staged --quiet; then
              echo "No git changes to commit (${msg})"
            else
              git commit -m "$msg"
              git pull --rebase origin main
              git push
            fi
          }
          YEAR="${{ steps.year.outputs.year }}"
          ROOT="datasets/stocks"
          if [ ! -d "$ROOT" ]; then
            echo "No ${ROOT}; nothing to update."
            exit 0
          fi
          mapfile -t dirs < <(find "$ROOT" -mindepth 1 -maxdepth 1 -type d | sort)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No ticker directories under ${ROOT}; nothing to update."
            exit 0
          fi
          first=true
          for dir in "${dirs[@]}"; do
            ticker_lower=$(basename "$dir")
            if [ "$first" != true ]; then
              sleep 3
            fi
            first=false
            ticker=$(echo "$ticker_lower" | tr '[:lower:]' '[:upper:]')
            target="${ROOT}/${ticker_lower}/${YEAR}/ohlcv.csv"
            echo "Checking ${ticker} -> ${target}"
            mkdir -p "${ROOT}/${ticker_lower}/${YEAR}"

            if [ -f "$target" ]; then
              recent_commit="$(git log -1 --since='6 hours ago' --format='%H' -- "$target" 2>/dev/null || true)"
              if [ -n "$recent_commit" ]; then
                echo "Skipping ${ticker}: ${target} updated in last 6 hours (${recent_commit})"
                continue
              fi
            fi

            tmp="$RUNNER_TEMP/${ticker_lower}_${YEAR}_ohlcv.csv"
            uv run --project scripts/python/yf --frozen --no-dev -- yf ohlcv "$ticker" "$YEAR" > "$tmp"
            if [ ! -s "$tmp" ]; then
              echo "::warning::Empty OHLCV output for ${ticker}; skipping"
              continue
            fi

            echo "Updating ${ticker}"
            mv "$tmp" "$target"
            git add "${ROOT}/${ticker_lower}"
            commit_if_staged "chore: ${ticker_lower} ohlcv daily update"
          done
