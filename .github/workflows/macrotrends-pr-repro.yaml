# Mirrors stocks-ohlcv-history (release binary + ./macrotrends | python3) for debugging; does not push.

name: macrotrends PR repro (temp)

on:
  pull_request:
    paths:
      - "scripts/go/macrotrends/**"
      - ".github/workflows/macrotrends-pr-repro.yaml"
  workflow_dispatch:
    inputs:
      ticker:
        description: Symbol (same as stocks-ohlcv-history workflow_dispatch)
        required: false
        default: AAPL
        type: string

permissions:
  contents: read

concurrency:
  group: macrotrends-repro-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest macrotrends release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("macrotrends-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'macrotrends' \
            --output ./macrotrends
          chmod +x ./macrotrends
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Same run block as stocks-ohlcv-history "Full history by year"; TICKER_INPUT only differs for PRs.
      - name: Full history by year (repro stocks-ohlcv-history)
        env:
          TICKER_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ticker || 'AAPL' }}
        run: |
          set -euo pipefail
          TICKER=$(echo "$TICKER_INPUT" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$TICKER" ]; then
            echo "::error::ticker input is empty"
            exit 1
          fi
          TICKER_LOWER=$(echo "$TICKER" | tr '[:upper:]' '[:lower:]')
          TICKER_UPPER=$(echo "$TICKER" | tr '[:lower:]' '[:upper:]')
          ROOT="datasets/stocks/${TICKER_LOWER}"
          mkdir -p "$ROOT"
          echo "Fetching full series for ${TICKER_UPPER}, splitting into ${ROOT}/<year>/ohlcv.csv"
          ./macrotrends "$TICKER_UPPER" | python3 - "$TICKER_LOWER" << 'PY'
          import csv
          import os
          import sys

          ticker_lower = sys.argv[1]
          root = os.path.join("datasets", "stocks", ticker_lower)
          rows_by_year = {}
          r = csv.DictReader(sys.stdin)
          fieldnames = r.fieldnames
          if not fieldnames:
              print("empty or headerless CSV", file=sys.stderr)
              sys.exit(1)
          fn = [f.strip() for f in fieldnames]
          date_key = "date" if "date" in fn else (fn[0] if fn else None)
          if not date_key:
              print("could not resolve date column", file=sys.stderr)
              sys.exit(1)
          for row in r:
              d = (row.get(date_key) or "").strip()
              if len(d) < 4:
                  continue
              y = d[:4]
              if not y.isdigit():
                  continue
              rows_by_year.setdefault(y, []).append(row)
          if not rows_by_year:
              print("no data rows after parse", file=sys.stderr)
              sys.exit(1)
          for y in sorted(rows_by_year.keys()):
              ydir = os.path.join(root, y)
              os.makedirs(ydir, exist_ok=True)
              path = os.path.join(ydir, "ohlcv.csv")
              with open(path, "w", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames, lineterminator="\n")
                  w.writeheader()
                  w.writerows(rows_by_year[y])
              print("wrote", path, f"({len(rows_by_year[y])} rows)")
          PY

      - name: List output tree (no commit)
        if: success()
        run: |
          set -x
          TICKER_LOWER=$(echo "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ticker || 'AAPL' }}" | tr '[:upper:]' '[:lower:]')
          find "datasets/stocks/${TICKER_LOWER}" -type f -name 'ohlcv.csv' 2>/dev/null | sort | head -20 || true
          find "datasets/stocks/${TICKER_LOWER}" -type f -name 'ohlcv.csv' 2>/dev/null | wc -l
