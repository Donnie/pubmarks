name: Datasets GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps"
      - "datasets/pe-dashboard"
  workflow_dispatch:
  workflow_run:
    workflows: [Datasets manifest]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-datasets
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build P/E dashboard
        working-directory: apps/pe-dashboard
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Copy dashboard into Pages artifact
        run: |
          set -euo pipefail
          rm -rf datasets/pe-dashboard
          mkdir -p datasets/pe-dashboard
          cp -R apps/pe-dashboard/dist/. datasets/pe-dashboard/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: datasets

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
