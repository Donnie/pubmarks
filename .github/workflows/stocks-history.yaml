name: Stocks history

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "One or more tickers (comma-separated), e.g. MSFT,AAPL."
        required: true
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest macrotrends release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("macrotrends-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'macrotrends' \
            --output ./macrotrends
          chmod +x ./macrotrends
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Full history by year
        env:
          TICKER_INPUT: ${{ github.event.inputs.ticker }}
        run: |
          set -euo pipefail
          TICKER_INPUT_TRIMMED=$(echo "$TICKER_INPUT" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$TICKER_INPUT_TRIMMED" ]; then
            echo "::error::ticker input is empty"
            exit 1
          fi
          IFS=',' read -ra TICKER_PARTS <<< "$TICKER_INPUT_TRIMMED"
          NONEMPTY=0
          for TICKER_RAW in "${TICKER_PARTS[@]}"; do
            T=$(echo "$TICKER_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -n "$T" ]; then
              NONEMPTY=$((NONEMPTY + 1))
            fi
          done
          if [ "$NONEMPTY" -eq 0 ]; then
            echo "::error::no valid tickers in input (comma-separated list is empty)"
            exit 1
          fi
          NEED_SLEEP_BEFORE_FETCH=false
          for TICKER_RAW in "${TICKER_PARTS[@]}"; do
            TICKER=$(echo "$TICKER_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$TICKER" ]; then
              continue
            fi
            TICKER_LOWER=$(echo "$TICKER" | tr '[:upper:]' '[:lower:]')
            TICKER_UPPER=$(echo "$TICKER" | tr '[:lower:]' '[:upper:]')
            ROOT="datasets/stocks/${TICKER_LOWER}"
            if [ -d "$ROOT" ]; then
              echo "Skipping ${TICKER_UPPER}: directory already exists (${ROOT})"
              continue
            fi
            if [ "$NEED_SLEEP_BEFORE_FETCH" = true ]; then
              echo "Waiting 3s before fetching ${TICKER_UPPER}..."
              sleep 3
            fi
            NEED_SLEEP_BEFORE_FETCH=true
            mkdir -p "$ROOT"
            echo "Fetching full series for ${TICKER_UPPER}, splitting into ${ROOT}/<year>/ohlcv.csv"
            OUT="$RUNNER_TEMP/macrotrends.stdout"
            ERR="$RUNNER_TEMP/macrotrends.stderr"
            set +e
            ./macrotrends ohlcv "$TICKER_UPPER" >"$OUT" 2>"$ERR"
            mt=$?
            set -e
            if [ "$mt" -ne 0 ]; then
              echo "::error::./macrotrends exited with status $mt for ${TICKER_UPPER}"
              cat "$ERR" >&2 || true
              exit "$mt"
            fi
            if [ ! -s "$OUT" ]; then
              echo "::error::./macrotrends produced empty stdout for ${TICKER_UPPER}"
              exit 1
            fi
            python3 - "$TICKER_LOWER" "$OUT" << 'PY'
          import csv
          import os
          import sys

          ticker_lower = sys.argv[1]
          path = sys.argv[2]
          root = os.path.join("datasets", "stocks", ticker_lower)
          rows_by_year = {}
          with open(path, newline="") as f:
              r = csv.DictReader(f)
              fieldnames = r.fieldnames
              if not fieldnames:
                  print("empty or headerless CSV", file=sys.stderr)
                  sys.exit(1)
              fn = [x.strip() for x in fieldnames]
              date_key = "date" if "date" in fn else (fn[0] if fn else None)
              if not date_key:
                  print("could not resolve date column", file=sys.stderr)
                  sys.exit(1)
              for row in r:
                  d = (row.get(date_key) or "").strip()
                  if len(d) < 4:
                      continue
                  y = d[:4]
                  if not y.isdigit():
                      continue
                  rows_by_year.setdefault(y, []).append(row)
          if not rows_by_year:
              print("no data rows after parse", file=sys.stderr)
              sys.exit(1)
          for y in sorted(rows_by_year.keys()):
              ydir = os.path.join(root, y)
              os.makedirs(ydir, exist_ok=True)
              out_path = os.path.join(ydir, "ohlcv.csv")
              with open(out_path, "w", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames, lineterminator="\n")
                  w.writeheader()
                  w.writerows(rows_by_year[y])
              print("wrote", out_path, f"({len(rows_by_year[y])} rows)")
          PY
          done

      - name: Update README stocks table
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import os
          import sys

          readme_path = "README.md"
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          if not repo:
              print("GITHUB_REPOSITORY is not set", file=sys.stderr)
              sys.exit(1)

          root = os.path.join("datasets", "stocks")
          entries = []
          if os.path.isdir(root):
              for name in os.listdir(root):
                  path = os.path.join(root, name)
                  if not os.path.isdir(path):
                      continue
                  years = sorted(
                      y
                      for y in os.listdir(path)
                      if len(y) == 4
                      and y.isdigit()
                      and os.path.isdir(os.path.join(path, y))
                  )
                  if years:
                      entries.append((name.upper(), name.lower(), years[0], years[-1]))
          entries.sort(key=lambda x: x[0])

          with open(readme_path, encoding="utf-8") as f:
              lines = f.readlines()

          start = None
          for i, line in enumerate(lines):
              if line.rstrip("\n") == "### Stocks":
                  start = i
                  break
          if start is None:
              print("README.md: ### Stocks heading not found", file=sys.stderr)
              sys.exit(1)

          j = start + 1
          while j < len(lines):
              line = lines[j]
              if line.strip() == "":
                  j += 1
                  continue
              if "| Ticker |" in line and line.lstrip().startswith("|"):
                  break
              j += 1
          else:
              print("README.md: stocks table not found after ### Stocks", file=sys.stderr)
              sys.exit(1)

          k = j
          while k < len(lines) and lines[k].lstrip().startswith("|"):
              k += 1

          def row(t_upper: str, t_lower: str, y0: str, y1: str) -> str:
              base = f"https://cdn.jsdelivr.net/gh/{repo}/datasets/stocks/{t_lower}"
              return (
                  f"| {t_upper} | "
                  f"[{y0}]({base}/{y0}/ohlcv.csv) | "
                  f"[{y1}]({base}/{y1}/ohlcv.csv) |\n"
              )

          new_table = [
              "| Ticker | First year | Last year |\n",
              "| ------ | ---------- | --------- |\n",
          ]
          for t_upper, t_lower, y0, y1 in entries:
              new_table.append(row(t_upper, t_lower, y0, y1))

          new_lines = lines[:j] + new_table + lines[k:]
          with open(readme_path, "w", encoding="utf-8", newline="\n") as f:
              f.writelines(new_lines)
          print("Updated README.md stocks table:", len(entries), "row(s), sorted by ticker")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/stocks/ README.md
          git diff --staged --quiet || (git commit -m "chore: stocks ohlcv history" && git pull --rebase origin main && git push)
