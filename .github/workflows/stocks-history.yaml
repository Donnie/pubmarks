name: Stocks history

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Optional. Comma-separated tickers (e.g. MSFT,AAPL). Leave empty to refresh full history for every ticker under datasets/stocks."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest macrotrends release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("macrotrends-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'macrotrends' \
            --output ./macrotrends
          chmod +x ./macrotrends
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Full history by year
        env:
          TICKER_INPUT: ${{ github.event.inputs.ticker || '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          YEAR="$(date -u +%Y)"
          commit_if_staged() {
            local msg="$1"
            if git diff --staged --quiet; then
              echo "No git changes to commit (${msg})"
            else
              git commit -m "$msg"
              git pull --rebase origin main
              git push
            fi
          }
          RAW="${TICKER_INPUT:-}"
          TICKER_INPUT_TRIMMED=$(echo "$RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -n "$TICKER_INPUT_TRIMMED" ]; then
            IFS=',' read -ra TICKER_PARTS <<< "$TICKER_INPUT_TRIMMED"
          else
            STOCKS_ROOT="datasets/stocks"
            if [ ! -d "$STOCKS_ROOT" ]; then
              echo "::error::ticker input is empty and ${STOCKS_ROOT} does not exist"
              exit 1
            fi
            mapfile -t ticker_dirs < <(find "$STOCKS_ROOT" -mindepth 1 -maxdepth 1 -type d | sort)
            if [ ${#ticker_dirs[@]} -eq 0 ]; then
              echo "::error::ticker input is empty and no ticker directories under ${STOCKS_ROOT}"
              exit 1
            fi
            TICKER_PARTS=()
            for d in "${ticker_dirs[@]}"; do
              tl=$(basename "$d")
              TICKER_PARTS+=("$(echo "$tl" | tr '[:lower:]' '[:upper:]')")
            done
            echo "No ticker input; updating full history for ${#TICKER_PARTS[@]} ticker(s) from ${STOCKS_ROOT}"
          fi
          NONEMPTY=0
          for TICKER_RAW in "${TICKER_PARTS[@]}"; do
            T=$(echo "$TICKER_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -n "$T" ]; then
              NONEMPTY=$((NONEMPTY + 1))
            fi
          done
          if [ "$NONEMPTY" -eq 0 ]; then
            echo "::error::no valid tickers (comma-separated list is empty)"
            exit 1
          fi
          NEED_SLEEP_BEFORE_MACROTRENDS=false
          for TICKER_RAW in "${TICKER_PARTS[@]}"; do
            TICKER=$(echo "$TICKER_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$TICKER" ]; then
              continue
            fi
            TICKER_LOWER=$(echo "$TICKER" | tr '[:upper:]' '[:lower:]')
            TICKER_UPPER=$(echo "$TICKER" | tr '[:lower:]' '[:upper:]')
            ROOT="datasets/stocks/${TICKER_LOWER}"
            YEAR_OHLCV="${ROOT}/${YEAR}/ohlcv.csv"
            YEAR_PER="${ROOT}/${YEAR}/peratio.csv"
            echo "Ticker ${TICKER_UPPER} (UTC year ${YEAR}): skip ohlcv if ${YEAR_OHLCV} exists; skip peratio if ${YEAR_PER} exists"
            if [ -f "$YEAR_OHLCV" ]; then
              echo "Skipping ohlcv for ${TICKER_UPPER}: ${YEAR_OHLCV} already exists"
            else
              if [ "$NEED_SLEEP_BEFORE_MACROTRENDS" = true ]; then
                echo "Waiting 3s before ohlcv fetch for ${TICKER_UPPER}..."
                sleep 3
              fi
              NEED_SLEEP_BEFORE_MACROTRENDS=true
              echo "Fetching full OHLCV series for ${TICKER_UPPER}, splitting into ${ROOT}/<year>/ohlcv.csv"
              OUT="$RUNNER_TEMP/macrotrends_ohlcv.stdout"
              ERR="$RUNNER_TEMP/macrotrends_ohlcv.stderr"
              set +e
              ./macrotrends ohlcv "$TICKER_UPPER" >"$OUT" 2>"$ERR"
              mt=$?
              set -e
              if [ "$mt" -ne 0 ]; then
                echo "::error::./macrotrends ohlcv exited with status $mt for ${TICKER_UPPER}"
                cat "$ERR" >&2 || true
                exit "$mt"
              fi
              if [ ! -s "$OUT" ]; then
                echo "::error::./macrotrends ohlcv produced empty stdout for ${TICKER_UPPER}"
                exit 1
              fi
              python3 scripts/python/split_stock_csv_by_year.py "$TICKER_LOWER" "$OUT" ohlcv.csv
              git add "datasets/stocks/${TICKER_LOWER}"
              commit_if_staged "chore: ${TICKER_LOWER} ohlcv history"
            fi
            if [ -f "$YEAR_PER" ]; then
              echo "Skipping peratio for ${TICKER_UPPER}: ${YEAR_PER} already exists"
            else
              if [ "$NEED_SLEEP_BEFORE_MACROTRENDS" = true ]; then
                echo "Waiting 3s before P/E fetch for ${TICKER_UPPER}..."
                sleep 3
              fi
              NEED_SLEEP_BEFORE_MACROTRENDS=true
              echo "Fetching full P/E series for ${TICKER_UPPER}, splitting into ${ROOT}/<year>/peratio.csv"
              OUT_PE="$RUNNER_TEMP/macrotrends_peratio.stdout"
              ERR_PE="$RUNNER_TEMP/macrotrends_peratio.stderr"
              set +e
              ./macrotrends peratio "$TICKER_UPPER" >"$OUT_PE" 2>"$ERR_PE"
              mt=$?
              set -e
              if [ "$mt" -ne 0 ]; then
                echo "::error::./macrotrends peratio exited with status $mt for ${TICKER_UPPER}"
                cat "$ERR_PE" >&2 || true
                exit "$mt"
              fi
              if [ ! -s "$OUT_PE" ]; then
                echo "::error::./macrotrends peratio produced empty stdout for ${TICKER_UPPER}"
                exit 1
              fi
              python3 scripts/python/split_stock_csv_by_year.py "$TICKER_LOWER" "$OUT_PE" peratio.csv
              git add "datasets/stocks/${TICKER_LOWER}"
              commit_if_staged "chore: ${TICKER_LOWER} peratio history"
            fi
          done

      - name: Update README stocks table
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import os
          import sys

          readme_path = "README.md"
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          if not repo:
              print("GITHUB_REPOSITORY is not set", file=sys.stderr)
              sys.exit(1)

          root = os.path.join("datasets", "stocks")
          entries = []
          if os.path.isdir(root):
              for name in os.listdir(root):
                  path = os.path.join(root, name)
                  if not os.path.isdir(path):
                      continue
                  years = sorted(
                      y
                      for y in os.listdir(path)
                      if len(y) == 4
                      and y.isdigit()
                      and os.path.isdir(os.path.join(path, y))
                  )
                  if years:
                      entries.append((name.upper(), name.lower(), years[0], years[-1]))
          entries.sort(key=lambda x: x[0])

          with open(readme_path, encoding="utf-8") as f:
              lines = f.readlines()

          start = None
          for i, line in enumerate(lines):
              if line.rstrip("\n") == "### Stocks":
                  start = i
                  break
          if start is None:
              print("README.md: ### Stocks heading not found", file=sys.stderr)
              sys.exit(1)

          j = start + 1
          while j < len(lines):
              line = lines[j]
              if line.strip() == "":
                  j += 1
                  continue
              if "| Ticker |" in line and line.lstrip().startswith("|"):
                  break
              j += 1
          else:
              print("README.md: stocks table not found after ### Stocks", file=sys.stderr)
              sys.exit(1)

          k = j
          while k < len(lines) and lines[k].lstrip().startswith("|"):
              k += 1

          def row(t_upper: str, t_lower: str, y0: str, y1: str) -> str:
              base = f"https://cdn.jsdelivr.net/gh/{repo}/datasets/stocks/{t_lower}"
              return (
                  f"| {t_upper} | "
                  f"[{y0}]({base}/{y0}/ohlcv.csv) | "
                  f"[{y1}]({base}/{y1}/ohlcv.csv) |\n"
              )

          new_table = [
              "| Ticker | First year | Last year |\n",
              "| ------ | ---------- | --------- |\n",
          ]
          for t_upper, t_lower, y0, y1 in entries:
              new_table.append(row(t_upper, t_lower, y0, y1))

          new_lines = lines[:j] + new_table + lines[k:]
          with open(readme_path, "w", encoding="utf-8", newline="\n") as f:
              f.writelines(new_lines)
          print("Updated README.md stocks table:", len(entries), "row(s), sorted by ticker")
          PY

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: readme stocks table" && git pull --rebase origin main && git push)
