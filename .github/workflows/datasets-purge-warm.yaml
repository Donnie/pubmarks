name: Datasets jsDelivr purge and warm

on:
  workflow_run:
    workflows:
      - ETFs update daily
      - Stocks history
      - Stocks OHLCV update daily
      - Stocks P/E update weekly
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Purge and warm jsDelivr for CSV and JSON (current UTC year paths)
        env:
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail
          YEAR="$(date -u +%Y)"
          n=0
          process_files() {
            while IFS= read -r -d '' f; do
              rel="${f#./}"
              purge_url="https://purge.jsdelivr.net/gh/${REPO}/${rel}"
              cdn_url="https://cdn.jsdelivr.net/gh/${REPO}/${rel}"
              echo "Purging ${purge_url}"
              curl -fsSL -o /dev/null -sS -X GET "$purge_url"
              echo "Warming ${cdn_url}"
              curl -fsSL -o /dev/null -sS -X GET "$cdn_url"
              n=$((n + 1))
            done
          }
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Manual trigger: targeting all files"
            process_files < <(find ./datasets -type f -print0)
          else
            case "${TRIGGER_WORKFLOW}" in
              "ETFs update daily")
                echo "Targeting datasets/etfs/**/latest.json"
                process_files < <(find ./datasets/etfs -type f -name 'latest.json' -print0)
                ;;
              "Stocks OHLCV update daily"|"Stocks P/E update weekly"|"Stocks history")
                echo "Targeting all CSV under datasets/stocks"
                process_files < <(find ./datasets/stocks -type f -name '*.csv' -print0)
                ;;
              *)
                echo "Targeting all files"
                process_files < <(find ./datasets -type f -print0)
                ;;
            esac
          fi
          echo "Processed ${n} file(s)."
