name: Datasets jsDelivr purge and warm

on:
  workflow_run:
    workflows:
      - Datasets manifest
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Purge and warm jsDelivr for all files under datasets/
        env:
          REPO: ${{ github.repository }}
          MAX_PARALLEL: 20
        run: |
          set -euo pipefail
          files0="$(mktemp)"
          find ./datasets -type f -print0 > "${files0}"
          n="$(tr -cd '\0' < "${files0}" | wc -c | tr -d ' ')"
          echo "Discovered ${n} file(s) under ./datasets"

          export REPO
          curl_pair() {
            local f="$1"
            local rel="${f#./}"
            local purge_url="https://purge.jsdelivr.net/gh/${REPO}/${rel}"
            local cdn_url="https://cdn.jsdelivr.net/gh/${REPO}/${rel}"

            echo "Purging ${purge_url}"
            curl -fsSL -o /dev/null -sS --retry 2 --retry-delay 1 --max-time 30 -X GET "${purge_url}"
            echo "Warming ${cdn_url}"
            curl -fsSL -o /dev/null -sS --retry 2 --retry-delay 1 --max-time 30 -X GET "${cdn_url}"
          }
          export -f curl_pair

          # Run multiple curl pairs concurrently on ONE runner.
          # If MAX_PARALLEL is unset/empty/non-numeric, default to 10.
          p="${MAX_PARALLEL:-10}"
          if ! [[ "${p}" =~ ^[0-9]+$ ]] || [[ "${p}" -lt 1 ]]; then
            p=10
          fi

          xargs -0 -n 1 -P "${p}" bash -lc 'curl_pair "$0"' < "${files0}"
          echo "Processed ${n} file(s)."
