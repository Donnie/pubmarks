name: Datasets jsDelivr purge and warm

on:
  workflow_run:
    workflows:
      - Stocks update daily
      - ETFs update daily
      - Stocks history
    types:
      - completed

permissions:
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      # head_sha is pre-run; daily workflow may push — use branch tip after fetch.
      - name: Checkout branch updated by daily workflow
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      - name: Sync to latest on branch
        run: git fetch origin "${{ github.event.workflow_run.head_branch }}" && git reset --hard "origin/${{ github.event.workflow_run.head_branch }}"

      - name: Purge and warm jsDelivr for CSV and JSON (current year paths)
        env:
          REPO: ${{ github.repository }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail
          n=0
          process_files() {
            while IFS= read -r -d '' f; do
              rel="${f#./}"
              purge_url="https://purge.jsdelivr.net/gh/${REPO}/${rel}"
              cdn_url="https://cdn.jsdelivr.net/gh/${REPO}/${rel}"
              echo "Purging ${purge_url}"
              curl -fsSL -o /dev/null -sS -X GET "$purge_url"
              echo "Warming ${cdn_url}"
              curl -fsSL -o /dev/null -sS -X GET "$cdn_url"
              n=$((n + 1))
            done
          }
          case "${TRIGGER_WORKFLOW}" in
            "ETFs update daily")
              echo "Targeting datasets/etfs/**/latest.json"
              process_files < <(find ./datasets/etfs -type f -name 'latest.json' -print0)
              ;;
            "Stocks update daily"|"Stocks history")
              echo "Targeting datasets/stocks CSV/JSON under paths containing 2026"
              process_files < <(find ./datasets/stocks -type f \( -name '*.csv' -o -name '*.json' \) -path '*2026*' -print0)
              ;;
            *)
              echo "::error::Unexpected triggering workflow: ${TRIGGER_WORKFLOW}"
              exit 1
              ;;
          esac
          echo "Processed ${n} file(s)."
