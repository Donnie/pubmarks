name: Datasets jsDelivr purge and warm

on:
  workflow_run:
    workflows:
      - ETFs update daily
      - Stocks history
      - Stocks OHLCV update daily
      - Stocks P/E update weekly
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Purge and warm jsDelivr for CSV and JSON (current UTC year paths)
        env:
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          MAX_PARALLEL: 10
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          files0="${tmp}/files0"
          : > "${files0}"

          write_files0() {
            # Writes a NUL-delimited list of file paths to stdout.
            if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
              echo "Manual trigger: targeting all files"
              find ./datasets -type f -print0
              return 0
            fi

            case "${TRIGGER_WORKFLOW}" in
              "ETFs update daily")
                echo "Targeting datasets/etfs/**/latest.json"
                find ./datasets/etfs -type f -name 'latest.json' -print0
                ;;
              "Stocks OHLCV update daily"|"Stocks P/E update weekly"|"Stocks history")
                echo "Targeting all CSV under datasets/stocks"
                find ./datasets/stocks -type f -name '*.csv' -print0
                ;;
              *)
                echo "Targeting all files"
                find ./datasets -type f -print0
                ;;
            esac
          }

          write_files0 > "${files0}"
          n="$(tr -cd '\0' < "${files0}" | wc -c | tr -d ' ')"
          echo "Discovered ${n} file(s)."

          export REPO
          curl_pair() {
            local f="$1"
            local rel="${f#./}"
            local purge_url="https://purge.jsdelivr.net/gh/${REPO}/${rel}"
            local cdn_url="https://cdn.jsdelivr.net/gh/${REPO}/${rel}"

            echo "Purging ${purge_url}"
            curl -fsSL -o /dev/null -sS --retry 2 --retry-delay 1 --max-time 30 -X GET "${purge_url}"
            echo "Warming ${cdn_url}"
            curl -fsSL -o /dev/null -sS --retry 2 --retry-delay 1 --max-time 30 -X GET "${cdn_url}"
          }
          export -f curl_pair

          # Run multiple curl pairs concurrently on ONE runner.
          # If MAX_PARALLEL is unset/empty/non-numeric, default to 10.
          p="${MAX_PARALLEL:-10}"
          if ! [[ "${p}" =~ ^[0-9]+$ ]] || [[ "${p}" -lt 1 ]]; then
            p=10
          fi

          xargs -0 -n 1 -P "${p}" bash -lc 'curl_pair "$0"' < "${files0}"
          echo "Processed ${n} file(s)."
