name: README stocks table

on:
  workflow_run:
    workflows:
      - Stocks history
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
          fetch-depth: 1

      - name: Sync to latest on branch
        if: github.event_name == 'workflow_run'
        run: git fetch origin "${{ github.event.workflow_run.head_branch }}" && git reset --hard "origin/${{ github.event.workflow_run.head_branch }}"

      - name: Update README stocks table
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import os
          import sys

          readme_path = "README.md"
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          if not repo:
              print("GITHUB_REPOSITORY is not set", file=sys.stderr)
              sys.exit(1)

          root = os.path.join("datasets", "stocks")
          entries = []
          if os.path.isdir(root):
              for name in os.listdir(root):
                  path = os.path.join(root, name)
                  if not os.path.isdir(path):
                      continue
                  ohlcv_years = []
                  peratio_years = []
                  for y in os.listdir(path):
                      if len(y) != 4 or not y.isdigit():
                          continue
                      ydir = os.path.join(path, y)
                      if not os.path.isdir(ydir):
                          continue
                      if os.path.isfile(os.path.join(ydir, "ohlcv.csv")):
                          ohlcv_years.append(y)
                      if os.path.isfile(os.path.join(ydir, "peratio.csv")):
                          peratio_years.append(y)
                  ohlcv_years.sort()
                  peratio_years.sort()
                  if ohlcv_years or peratio_years:
                      entries.append((name.upper(), name.lower(), ohlcv_years, peratio_years))
          entries.sort(key=lambda x: x[0])

          with open(readme_path, encoding="utf-8") as f:
              lines = f.readlines()

          start = None
          for i, line in enumerate(lines):
              if line.rstrip("\n") == "### Stocks":
                  start = i
                  break
          if start is None:
              print("README.md: ### Stocks heading not found", file=sys.stderr)
              sys.exit(1)

          j = start + 1
          while j < len(lines):
              line = lines[j]
              if line.strip() == "":
                  j += 1
                  continue
              if "| Ticker |" in line and line.lstrip().startswith("|"):
                  break
              j += 1
          else:
              print("README.md: stocks table not found after ### Stocks", file=sys.stderr)
              sys.exit(1)

          k = j
          while k < len(lines) and lines[k].lstrip().startswith("|"):
              k += 1

          def link_cell(base: str, year: str, filename: str) -> str:
              return f"[{year}]({base}/{year}/{filename})"

          def row(
              t_upper: str,
              t_lower: str,
              ohlcv_years: list,
              peratio_years: list,
          ) -> str:
              base = f"https://cdn.jsdelivr.net/gh/{repo}/datasets/stocks/{t_lower}"
              o0 = o1 = "—"
              if ohlcv_years:
                  o0 = link_cell(base, ohlcv_years[0], "ohlcv.csv")
                  o1 = link_cell(base, ohlcv_years[-1], "ohlcv.csv")
              p0 = p1 = "—"
              if peratio_years:
                  p0 = link_cell(base, peratio_years[0], "peratio.csv")
                  p1 = link_cell(base, peratio_years[-1], "peratio.csv")
              return f"| {t_upper} | {o0} | {o1} | {p0} | {p1} |\n"

          new_table = [
              "| Ticker | OHLCV (first) | OHLCV (last) | P/E (first) | P/E (last) |\n",
              "| ------ | ------------- | ------------ | ----------- | ---------- |\n",
          ]
          for t_upper, t_lower, oy, py in entries:
              new_table.append(row(t_upper, t_lower, oy, py))

          new_lines = lines[:j] + new_table + lines[k:]
          with open(readme_path, "w", encoding="utf-8", newline="\n") as f:
              f.writelines(new_lines)
          print("Updated README.md stocks table:", len(entries), "row(s), sorted by ticker")
          PY

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (
            git commit -m "chore: readme stocks table" &&
            branch="$(git branch --show-current)" &&
            git pull --rebase origin "$branch" &&
            git push
          )
