name: Stocks P/E update weekly

on:
  schedule:
    # Saturday
    - cron: "0 0 * * 6"
  workflow_dispatch:
    inputs:
      force:
        description: "Run every ticker even if its peratio was updated within the last 7 days"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Current year (UTC)
        id: year
        run: echo "year=$(date -u +%Y)" >> "$GITHUB_OUTPUT"

      - name: Download latest macrotrends release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("macrotrends-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'macrotrends' \
            --output ./macrotrends
          chmod +x ./macrotrends
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover tickers and refresh current-year P/E
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          commit_if_staged() {
            local msg="$1"
            if git diff --staged --quiet; then
              echo "No git changes to commit (${msg})"
            else
              git commit -m "$msg"
              git pull --rebase origin main
              git push
            fi
          }
          FORCE_ALL=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_ALL=true
          fi

          YEAR="${{ steps.year.outputs.year }}"
          ROOT="datasets/stocks"
          if [ ! -d "$ROOT" ]; then
            echo "No ${ROOT}; nothing to update."
            exit 0
          fi
          mapfile -t dirs < <(find "$ROOT" -mindepth 1 -maxdepth 1 -type d | sort)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No ticker directories under ${ROOT}; nothing to update."
            exit 0
          fi
          prev_ran=false
          for dir in "${dirs[@]}"; do
            ticker_lower=$(basename "$dir")
            ticker=$(echo "$ticker_lower" | tr '[:lower:]' '[:upper:]')

            if [ "$FORCE_ALL" != true ]; then
              last_ts=$(git log -1 --format=%ct -- ":(glob)datasets/stocks/${ticker_lower}/**/peratio.csv" 2>/dev/null || true)
              last_ts=$(echo "$last_ts" | tr -d '[:space:]')
              if [ -n "$last_ts" ]; then
                now=$(date +%s)
                week_ago=$((now - 7 * 24 * 3600))
                if [ "$last_ts" -gt "$week_ago" ]; then
                  echo "Skipping ${ticker}: peratio last committed within 7 days ($(date -u -d "@$last_ts" +%Y-%m-%dT%H:%M:%SZ))"
                  continue
                fi
              fi
            fi

            if [ "$prev_ran" = true ]; then
              sleep 3
            fi
            prev_ran=true

            echo "Updating ${ticker} -> ${ROOT}/${ticker_lower}/${YEAR}/peratio.csv"
            mkdir -p "${ROOT}/${ticker_lower}/${YEAR}"
            ./macrotrends peratio "$ticker" "$YEAR" > "${ROOT}/${ticker_lower}/${YEAR}/peratio.csv"
            git add "${ROOT}/${ticker_lower}"
            commit_if_staged "chore: ${ticker_lower} peratio weekly update"
          done
