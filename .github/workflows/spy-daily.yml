name: ETFs update daily

on:
  schedule:
    # 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch: # allow manual run

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ticker: [SPY, XSD]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest spy release
        run: |
          gh release download \
            $(gh release list --repo ${{ github.repository }} \
              --json tagName \
              --jq '[.[] | select(.tagName | startswith("spy-"))] | .[0].tagName') \
            --repo ${{ github.repository }} \
            --pattern 'spy' \
            --output ./spy
          chmod +x ./spy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set ticker output
        id: ticker
        run: echo "lower=$(echo ${{ matrix.ticker }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Run spy and save dated snapshot
        env:
          TICKER: ${{ matrix.ticker }}
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
          PAGE_URL: ${{ secrets.PAGE_URL }}
        run: |
          TICKER_LOWER=${{ steps.ticker.outputs.lower }}
          mkdir -p datasets/etfs/${TICKER_LOWER}
          OUTPUT=$(./spy)
          DATE=$(echo "$OUTPUT" | jq -r '.date')
          echo "$OUTPUT" > datasets/etfs/${TICKER_LOWER}/${DATE}.json
          ln -sf ${DATE}.json datasets/etfs/${TICKER_LOWER}/latest.json

      - name: Upload dataset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ticker.outputs.lower }}
          path: datasets/etfs/${{ steps.ticker.outputs.lower }}/

  commit:
    runs-on: ubuntu-latest
    needs: fetch
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all datasets
        uses: actions/download-artifact@v4
        with:
          path: datasets/etfs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/
          git diff --staged --quiet || (git commit -m "chore: etfs update $(date +%Y-%m-%d)" && git push)
