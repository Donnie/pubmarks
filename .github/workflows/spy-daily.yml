name: SPY holdings daily

on:
  schedule:
    # 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch: # allow manual run

permissions:
  contents: write

jobs:
  update-spy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run spy and update spy.json
        working-directory: scripts/go/spy
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
        run: |
          go run . > ../../../datasets/etfs/spy.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/etfs/spy.json
          git diff --staged --quiet || (git commit -m "chore: update SPY holdings" && git push)
